<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Mandarin Phrase Lab</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="brand">
          <div class="brand-mark">汉</div>
          <div>
            <strong>Mandarin Phrase Lab</strong>
            <span>A2-B1 intensif</span>
          </div>
        </div>

        <label class="search-box" for="searchInput">
          <span aria-hidden="true">
            <svg viewBox="0 0 24 24"><path d="m21 21-4.35-4.35m1.35-5.15a6.5 6.5 0 1 1-13 0 6.5 6.5 0 0 1 13 0Z"/></svg>
          </span>
          <input id="searchInput" type="search" placeholder="Rechercher..." autocomplete="off" />
        </label>

        <div class="scope-switch" id="scopeSwitch" role="tablist" aria-label="Type d'exercice"></div>

        <nav class="theme-nav" id="themeNav" aria-label="Themes"></nav>

        <div class="source-card">
          <span>Audio</span>
          <strong>Google Translate</strong>
          <button class="text-button" id="testVoiceButton" type="button">Tester la voix</button>
        </div>
      </aside>

      <main class="main">
        <header class="topbar">
          <div>
            <p class="eyebrow">Mandarin simplifié</p>
            <h1>Pratique de phrases courantes</h1>
          </div>
          <div class="mode-switch" id="modeSwitch" role="tablist" aria-label="Modes"></div>
        </header>

        <section class="stats-grid" id="statsGrid" aria-label="Progression"></section>

        <section class="workspace">
          <div class="study-surface" id="practiceArea"></div>

          <aside class="phrase-panel">
            <div class="panel-head">
              <div>
                <p class="eyebrow">Corpus local</p>
                <h2 id="listTitle">Toutes les phrases</h2>
              </div>
              <button class="icon-button" id="shuffleButton" type="button" title="Melanger la session" aria-label="Melanger la session">
                <svg viewBox="0 0 24 24"><path d="M16 3h5v5M4 20l5.5-5.5M21 3l-7.5 7.5M21 16v5h-5M4 4l17 17"/></svg>
              </button>
            </div>
            <div class="phrase-list" id="phraseList"></div>
          </aside>
        </section>
      </main>
    </div>

    <audio id="ttsPlayer" preload="none"></audio>
    <div id="modalRoot"></div>
    <div class="char-popover" id="charPopover" hidden></div>
    <script src="app.js"></script>
  </body>
</html>
